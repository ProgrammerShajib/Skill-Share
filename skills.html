<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Browse Skills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-5 mb-5">
        <h2 class="mb-2 fw-bold text-center">Explore Skills</h2>
        <p class="text-center text-muted mb-4">Find what you want to learn and connect with peers.</p>

        <!-- Search & Filter Bar -->
        <div class="row justify-content-center mb-4">
            <div class="col-lg-5 col-md-6 mb-3">
                <div class="input-group modern-input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0"
                        placeholder="Search by skill or instructor...">
                </div>
            </div>
            <div class="col-lg-4 col-md-6 mb-3">
                <select id="categoryFilter" class="form-select modern-select">
                    <option value="all">All Categories</option>
                    <option value="Programming">Programming</option>
                    <option value="Design">Design</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Artificial Intelligence">Artificial Intelligence</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Photography">Photography</option>
                    <option value="Security">Security</option>
                    <option value="Technology">Technology</option>
                    <option value="Personal Development">Personal Development</option>
                    <option value="Business">Business</option>
                    <option value="Writing">Writing</option>
                    <option value="Video Production">Video Production</option>
                    <option value="Game Development">Game Development</option>
                    <option value="Cloud">Cloud</option>
                    <option value="Productivity">Productivity</option>
                    <option value="Art">Art</option>
                    <option value="Database">Database</option>
                    <option value="Languages">Languages</option>
                    <option value="Academics">Academics</option>
                </select>
            </div>
        </div>

        <div class="row" id="skills-list">
            <!-- Skills will be injected here -->
        </div>
        <div id="no-results" class="text-center mt-5 d-none">
            <i class="bi bi-emoji-frown fs-1 text-muted"></i>
            <h5 class="mt-2 text-muted">No skills found matching your search.</h5>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/notices.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
