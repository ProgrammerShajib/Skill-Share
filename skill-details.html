<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Skill Details | SkillShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-5 mb-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb modern-breadcrumb">
                <li class="breadcrumb-item"><a href="skills.html" class="text-decoration-none">Skills</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-title">Loading...</li>
            </ol>
        </nav>

        <div class="row mt-4">
            <div class="col-lg-8">
                <img id="detail-image" src="" class="w-100 rounded-4 mb-4 shadow-sm"
                    style="height: 400px; object-fit: cover;" alt="Skill Image">
                <span id="detail-category" class="badge rounded-pill mb-3"
                    style="background: #D4530A; color: white; padding: 0.5rem 1rem; font-size: 0.85rem;"></span>
                <h2 id="detail-title" class="fw-bold">Loading...</h2>
                <p id="detail-description" class="lead text-muted mt-3"></p>
            </div>

            <div class="col-lg-4">
                <div class="card card-premium border-0 shadow-sm sticky-lg-top" style="top: 100px;">
                    <div class="card-body text-center p-4">
                        <h5 class="text-muted mb-3">Course Instructor</h5>
                        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png"
                            width="80" class="rounded-circle mb-2 border" alt="Instructor">
                        <p id="detail-provider" class="fw-bold fs-5 mb-1">Loading...</p>
                        <p class="text-muted small mb-4">Available for sessions</p>
                        <button class="btn btn-premium w-100 py-2 fw-bold">Book a Session</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Video Section -->
        <div id="video-container" class="card card-premium border-0 shadow-sm mb-4 p-4 mt-4 d-none">
            <h5 class="fw-bold mb-3"><i class="bi bi-play-circle text-danger me-2"></i>Course Preview</h5>
            <div class="ratio ratio-16x9 rounded overflow-hidden shadow">
                <iframe id="detail-video" src="" allowfullscreen></iframe>
            </div>
        </div>

        <!-- File Download Section -->
        <div id="file-container" class="card card-premium border-0 shadow-sm p-4 mt-4 d-none">
            <h5 class="fw-bold mb-3"><i class="bi bi-file-earmark-arrow-down text-success me-2"></i>Course Materials
            </h5>
            <a id="detail-file" href="#" target="_blank" class="btn btn-premium w-100 py-2 fw-bold">
                <i class="bi bi-cloud-download me-2"></i>Download Resources
            </a>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/notices.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
