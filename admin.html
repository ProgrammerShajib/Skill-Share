<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel | SkillShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-5 mb-5" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-shield-lock me-2 text-danger"></i>Admin Panel</h2>
                <p class="text-muted small mt-1">Manage notices and user accounts</p>
            </div>
            <a href="notices.html" class="btn btn-outline-dark rounded-pill px-4">
                <i class="bi bi-eye me-1"></i> View Public Notices
            </a>
        </div>

        <!-- Publish Notice Form -->
        <div class="card card-premium border-0 shadow-sm mb-5">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-megaphone me-2 text-primary"></i>Publish New Notice</h5>
                <form id="adminNoticeForm">
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label class="form-label">Notice Title</label>
                            <input type="text" id="noticeTitle" class="form-control"
                                placeholder="e.g. Exam Schedule Update" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" id="noticeDate" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notice Content</label>
                        <textarea id="noticeContent" class="form-control" rows="3"
                            placeholder="Write the notice details here..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-premium px-4">
                        <i class="bi bi-send me-1"></i> Publish Notice
                    </button>
                </form>
            </div>
        </div>

        <!-- Existing Notices Table -->
        <h5 class="fw-bold mb-3">All Published Notices</h5>
        <div class="table-responsive shadow-sm rounded-3 overflow-hidden mb-5">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Title</th>
                        <th>Date</th>
                        <th class="text-center pe-4">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-notice-table-body">
                </tbody>
            </table>
        </div>

        <!-- NEW: Manage User Accounts -->
        <h5 class="fw-bold mb-3"><i class="bi bi-people me-2 text-warning"></i>Manage Contributor Accounts</h5>
        <div class="alert alert-light border rounded-3 small">
            <i class="bi bi-info-circle me-1"></i> <strong>Note:</strong> Deleting a contributor will permanently remove
            their account and <strong>all skills they have posted</strong>.
        </div>
        <div class="table-responsive shadow-sm rounded-3 overflow-hidden">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">User Name</th>
                        <th>Email</th>
                        <th class="text-center pe-4">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-user-table-body">
                </tbody>
            </table>
        </div>

    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/notices.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
