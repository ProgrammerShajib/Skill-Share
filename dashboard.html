<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container mt-5">
        <h2 id="welcome-msg" class="mb-4">Welcome!</h2>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>My Offered Skills</h4>
            <button class="btn btn-primary rounded-pill modern-btn px-4" data-bs-toggle="modal" data-bs-target="#crudModal">
                <i class="bi bi-plus-lg me-1"></i> Offer New Skill
            </button>
        </div>
        
        <div class="table-responsive shadow-sm rounded-3 overflow-hidden">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Skill Title</th>
                        <th>Category</th>
                        <th>Resources</th>
                        <th class="text-center pe-4">Action</th>
                    </tr>
                </thead>
                <tbody id="crud-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Updated with new fields -->
    <div class="modal fade" id="crudModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content modern-card border-0 shadow">
          <form id="crudForm">
              <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-stars text-warning me-2"></i>Offer a New Skill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body px-4 pb-4">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Skill Title</label>
                        <input type="text" id="skillTitle" class="form-control modern-input" placeholder="e.g. Graphic Design" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <select id="skillCat" class="form-select modern-input" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Programming">Programming</option>
                            <option value="Design">Design</option>
                            <option value="Languages">Languages</option>
                            <option value="Academics">Academics</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea id="skillDesc" class="form-control modern-input" rows="3" placeholder="Describe what you will teach..." required></textarea>
                </div>
                
                <hr class="my-4 text-muted">

                <h6 class="fw-bold text-muted mb-3"><i class="bi bi-link-45deg me-2"></i>External Resources (Optional)</h6>
                
                <div class="mb-3">
                    <label class="form-label text-muted">YouTube Video Link</label>
                    <input type="url" id="skillVideo" class="form-control modern-input" placeholder="https://www.youtube.com/watch?v=...">
                    <div class="form-text">Paste a YouTube link to show a preview video on the course page.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Downloadable Material Link</label>
                    <input type="url" id="skillFile" class="form-control modern-input" placeholder="https://drive.google.com/file/...">
                    <div class="form-text">Link to Google Drive, Mega, or any direct file download URL.</div>
                </div>
              </div>
              <div class="modal-footer border-0 pt-0 px-4 pb-4">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary rounded-pill modern-btn px-4"><i class="bi bi-save me-1"></i> Save & Publish</button>
              </div>
          </form>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
