<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container mt-5">
        <h2 id="welcome-msg" class="mb-4">Welcome!</h2>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>My Offered Skills</h4>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#crudModal">+ Offer a New Skill</button>
        </div>
        
        <table class="table table-striped table-hover border shadow-sm">
            <thead class="table-dark">
                <tr><th>Skill Title</th><th>Category</th><th>Action</th></tr>
            </thead>
            <tbody id="crud-table-body">
                </tbody>
        </table>
    </div>

    <div class="modal fade" id="crudModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="crudForm">
              <div class="modal-header">
                <h5 class="modal-title">Offer a New Skill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <input type="text" id="skillTitle" class="form-control mb-3" placeholder="Skill Title (e.g. Graphic Design)" required>
                <select id="skillCat" class="form-select mb-3" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Programming">Programming</option>
                    <option value="Design">Design</option>
                    <option value="Languages">Languages</option>
                    <option value="Academics">Academics</option>
                </select>
                <textarea id="skillDesc" class="form-control" rows="3" placeholder="Describe what you will teach..." required></textarea>
              </div>
              <div class="modal-footer">
                <button type="submit" class="btn btn-primary">Save Skill & Publish</button>
              </div>
          </form>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
