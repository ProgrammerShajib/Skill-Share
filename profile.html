<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | SkillShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="container mt-5" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-5">
                <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="rounded-circle mb-3 shadow-sm" width="150" height="150" alt="Profile Picture">
                <h3 class="fw-bold">Sajib Barua</h3>
                <p class="text-primary fw-semibold">Computer Science Student | Web Development & AI Enthusiast</p>
                <p class="text-muted mt-3">Passionate about building scalable web applications and exploring the depths of Artificial Intelligence. Always ready to learn, teach, and prepare for top tech opportunities.</p>
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <button class="btn btn-primary px-4">Message</button>
                    <button class="btn btn-outline-secondary px-4">View Offered Skills</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
