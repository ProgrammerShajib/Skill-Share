<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | SkillShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="container mt-5 mb-5" style="max-width: 900px;">
        
        <!-- Profile Header Card -->
        <div class="warm-card p-4 p-md-5 shadow-sm border-0 text-center mb-4">
            <div class="position-relative d-inline-block">
                <img id="profile-pic" src="" class="rounded-circle mb-3 shadow-sm border border-3 border-white" width="150" height="150" style="object-fit: cover; background-color: #f0f0f0;" alt="Profile Picture">
            </div>
            <h3 id="profile-name" class="fw-bold text-warm-heading mb-1">Loading...</h3>
            <p id="profile-bio" class="text-warm-body-muted mt-2 px-md-5 mx-auto" style="max-width: 600px;">No bio available yet.</p>
            
            <div class="d-flex justify-content-center gap-3 mt-4">
                <button id="edit-profile-btn" class="btn btn-warm-glow px-4 rounded-pill d-none" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                    <i class="bi bi-pencil-square me-1"></i> Edit Profile
                </button>
            </div>
        </div>

        <!-- Offered Skills Section -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold text-warm-heading mb-0">Skills Offered</h4>
        </div>
        <div class="row" id="profile-skills-list"></div>
        <div id="no-skills-msg" class="text-center py-5 d-none">
            <i class="bi bi-inbox fs-1 text-warm-body-muted"></i>
            <h5 class="mt-2 text-warm-body-muted">This user hasn't offered any skills yet.</h5>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content warm-card border-0 shadow">
          <form id="editProfileForm">
              <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-warm-heading"><i class="bi bi-gear me-2"></i>Edit Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body px-4 pb-4">
                
                <!-- NEW: Upload from device button -->
                <div class="mb-3">
                    <label class="form-label">Profile Picture</label>
                    <input type="file" id="imageUpload" accept="image/*" class="form-control" style="display:none;">
                    <button type="button" id="uploadBtn" class="btn btn-outline-secondary w-100 rounded-pill">
                        <i class="bi bi-cloud-arrow-up me-2"></i> Choose Image from Device
                    </button>
                    <!-- Preview of selected image -->
                    <img id="imagePreview" src="" class="mt-3 rounded-circle d-none mx-auto d-block border" width="80" height="80" style="object-fit:cover;" alt="Preview">
                    <div class="form-text text-center mt-1">Select an image from your computer/phone. It will be compressed automatically.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bio / Title</label>
                    <textarea id="editBio" class="form-control" rows="3" placeholder="e.g. Computer Science Student | Web Development & AI Enthusiast"></textarea>
                </div>
              </div>
              <div class="modal-footer border-0 pt-0 px-4 pb-4">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-warm-glow rounded-pill px-4">Save Changes</button>
              </div>
          </form>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
